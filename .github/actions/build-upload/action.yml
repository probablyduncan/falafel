name: Build and upload
description: Build the Astro site and upload it as a GitHub Pages artifact

inputs:
  cache:
    description: Enable the Astro build cache to speed up subsequent builds
    required: false
    default: "true"
  cache-dir:
    description: Path to the Astro cache directory
    required: false
    default: node_modules/.astro
  out-dir:
    description: Path to the Astro build output directory
    required: false
    default: dist

runs:
  using: composite
  steps:
    - name: Restore Astro cache
      if: ${{ inputs.cache == 'true' }}
      id: astro-cache-restore
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ inputs.cache-dir }}
        key: astro-cache-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          astro-cache-${{ runner.os }}-

    - name: Build
      shell: bash
      run: pnpm run build

    - name: Save Astro cache
      if: ${{ inputs.cache == 'true' && steps.astro-cache-restore.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ inputs.cache-dir }}
        key: ${{ steps.astro-cache-restore.outputs.cache-primary-key }}

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
      with:
        path: ${{ inputs.out-dir }}/
        include-hidden-files: true
