name: build

on:
  # when main is updated
  push:
    branches: [main]
  # allow manual run
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let running deploys finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_ATPROTO_DID: ${{ vars.PUBLIC_ATPROTO_DID }}
      PUBLIC_ATPROTO_PUBLICATION_RKEY: ${{ vars.PUBLIC_ATPROTO_PUBLICATION_RKEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build and upload
        uses: ./.github/actions/build-upload

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
